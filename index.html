<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Store Pedia</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; color: #333; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; background: #ffffff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; font-size: 24px; }
        .subtitle { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; color: #34495e; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: #3498db; }
        .price-box { background: #e8f4fd; border: 1px solid #3498db; padding: 15px; border-radius: 8px; text-align: center; margin: 20px 0; }
        .price-box span { block; font-size: 14px; color: #2980b9; }
        .price-box h2 { font-size: 26px; color: #2c3e50; margin-top: 5px; }
        .payment-info { background: #f9f9f9; border: 1px dashed #bdc3c7; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .payment-title { font-weight: bold; font-size: 14px; margin-bottom: 8px; color: #2c3e50; }
        .bank-card { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 10px; border-radius: 6px; border: 1px solid #e0e0e0; margin-bottom: 8px; }
        .bank-details { font-size: 13px; }
        .btn-copy { background: #3498db; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .btn-copy:active { background: #2980b9; }
        .btn-order { width: 100%; background: #25d366; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-order:hover { background: #1ebe57; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Master Store Pedia</h1>
    <p class="subtitle">Layanan Penambah Followers & Views Berkualitas</p>

    <!-- Pilihan Layanan -->
    <div class="form-group">
        <label for="layanan">Pilih Layanan</label>
        <select id="layanan" onchange="hitungHarga()">
            <option value="shopee">Shopee Followers (Rp 65.000 / 1K)</option>
            <option value="tiktok">TikTok Followers (Rp 85.000 / 1K)</option>
            <option value="instagram">Instagram Followers (Rp 90.000 / 1K)</option>
            <option value="views">All Media Views (Rp 50.000 / 1K)</option>
        </select>
    </div>

    <!-- Jumlah Order -->
    <div class="form-group">
        <label for="jumlah">Jumlah Kelipatan (per 1.000)</label>
        <input type="number" id="jumlah" value="1" min="1" oninput="hitungHarga()">
    </div>

    <!-- Input Target/Link -->
    <div class="form-group">
        <label for="target">Link Akun / Username Target</label>
        <input type="text" id="target" placeholder="Contoh: @username atau link profile">
    </div>

    <!-- Kotak Total Harga -->
    <div class="price-box">
        <span>Total Pembayaran</span>
        <h2 id="total-harga">Rp 65.000</h2>
    </div>

    <!-- Informasi Pembayaran -->
    <div class="payment-info">
        <div class="payment-title">Metode Pembayaran (A.N Moch Mastur Rido Haqiqi):</div>
        
        <div class="bank-card">
            <div class="bank-details">
                <strong>DANA</strong><br>
                082139291979
            </div>
            <button class="btn-copy" onclick="copyText('082139291979')">Salin</button>
        </div>

        <div class="bank-card">
            <div class="bank-details">
                <strong>SeaBank</strong><br>
                901917713714
            </div>
            <button class="btn-copy" onclick="copyText('901917713714')">Salin</button>
        </div>
    </div>

    <!-- Tombol Kirim -->
    <button class="btn-order" onclick="kirimOrder()">
        🛒 Kirim Order via WhatsApp
    </button>
</div>

<script>
    // Data Harga per 1000
    const hargaLayanan = {
        shopee: 65000,
        tiktok: 85000,
        instagram: 90000,
        views: 50000
    };

    function hitungHarga() {
        const layanan = document.getElementById('layanan').value;
        const jumlah = parseInt(document.getElementById('jumlah').value) || 1;
        const total = hargaLayanan[layanan] * jumlah;
        
        document.getElementById('total-harga').innerText = 'Rp ' + total.toLocaleString('id-ID');
    }

    function copyText(text) {
        navigator.clipboard.writeText(text).then(() => {
            alert('Nomor rekening berhasil disalin: ' + text);
        }).catch(err => {
            alert('Gagal menyalin text');
        });
    }

    function kirimOrder() {
        const layananSelect = document.getElementById('layanan');
        const namaLayanan = layananSelect.options[layananSelect.selectedIndex].text;
        const jumlah = document.getElementById('jumlah').value;
        const target = document.getElementById('target').value;
        const totalHarga = document.getElementById('total-harga').innerText;

        if (!target) {
            alert('Silakan isi Link Akun / Username Target terlebih dahulu!');
            return;
        }

        // Format pesan WhatsApp
        const nomorWA = '6282139291979'; 
        const teksPesan = `Halo Master Store Pedia, saya ingin konfirmasi order:%0A%0A` +
                          `• *Layanan:* ${namaLayanan}%0A` +
                          `• *Jumlah:* ${jumlah} K (Kelipatan)%0A` +
                          `• *Target:* ${target}%0A` +
                          `• *Total Transfer:* ${totalHarga}%0A%0A` +
                          `Saya sudah melakukan transfer, mohon segera diproses ya.`;

        window.open(`https://wa.me/${nomorWA}?text=${teksPesan}`, '_blank');
    }
</script>

</body>
</html>
